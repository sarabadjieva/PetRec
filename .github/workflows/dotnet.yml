name: Build and Test

on:
  push:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Add GitHub NuGet source
        run: dotnet nuget add source "https://nuget.pkg.github.com/sarabadjieva/index.json" --name github --username sarabadjieva --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      # Build all non-platform specific projects
      - name: Build shared projects
        run: dotnet build PetRec.sln -f net10.0 --no-restore

      # Build MAUI Android explicitly
      - name: Build Mobile (Android)
        run: dotnet build PetRec.Mobile/PetRec.Mobile.csproj -f net10.0-android --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal
